name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─── Job 1: PR — test + build only ───────────────────────────────
  test-and-build:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: pytest

      - name: Build Order Service Image (validation only)
        run: docker build -t fastapi-order-service:pr-${{ github.event.pull_request.number }} .
        
      - name: Build Inventory Service Image (validation only)
        run: docker build -t fastapi-inventory-service:pr-${{ github.event.pull_request.number }} .

  # ─── Job 2: Merge to main — test + build + push + update repo ────────────────────────────
  test-build-push:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: pytest

      - name: Set image version tag
        id: version
        run: echo "tag=${GITHUB_SHA::8}" >> $GITHUB_OUTPUT

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}


      - name: Build Docker images
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/fastapi-order-service:${{ steps.version.outputs.tag }} .
          docker build -t ${{ secrets.DOCKER_USERNAME }}/fastapi-inventory-service:${{ steps.version.outputs.tag }} .

      - name: Push Docker images
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/fastapi-order-service:${{ steps.version.outputs.tag }}
          docker push ${{ secrets.DOCKER_USERNAME }}/fastapi-inventory-service:${{ steps.version.outputs.tag }}

      - name: Print pushed image versions
        run: |
          echo "==========================================="
          echo "Docker images successfully pushed:"
          echo "  ${{ secrets.DOCKER_USERNAME }}/fastapi-order-service:${{ steps.version.outputs.tag }}"
          echo "  ${{ secrets.DOCKER_USERNAME }}/fastapi-inventory-service:${{ steps.version.outputs.tag }}"
          echo "==========================================="

      - name: Checkout deploy repository
        uses: actions/checkout@v4
        with:
          repository: SAI-KISHORE29/observability-task-deployment
          token: ${{ secrets.GH_PAT }}
          path: observability-task-deployment

      - name: Update image tags in deployment.yaml
        run: |
          sed -i "s|\(image: .*/fastapi-order-service:\).*|\1${{ steps.version.outputs.tag }}|" observability-task-deployment/deployment.yaml
          sed -i "s|\(image: .*/fastapi-inventory-service:\).*|\1${{ steps.version.outputs.tag }}|" observability-task-deployment/deployment.yaml

      - name: Raise PR to deploy repository
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          cd observability-task-deployment
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          BRANCH="update-images-${{ steps.version.outputs.tag }}"
          git checkout -b $BRANCH
          git add deployment.yaml
          git commit -m "chore: update FastAPI service images to ${{ steps.version.outputs.tag }}"
          git push origin $BRANCH
          gh pr create \
            --repo SAI-KISHORE29/observability-task-deployment \
            --base main \
            --head $BRANCH \
            --title "chore: update FastAPI service images to ${{ steps.version.outputs.tag }}" \
            --body "Automated PR: update Order and Inventory API container images to tag \`${{ steps.version.outputs.tag }}\`"